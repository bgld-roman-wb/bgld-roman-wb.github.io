name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Own step, separate from the Astro build below: a data pipeline failure (see
      # scripts/pipeline/build-data.mjs) must show up distinctly in the Actions log, and must
      # fail the whole job before an Astro build or deploy can ever run on bad data.
      - name: Run data pipeline
        run: npm run build:data

      - name: Build site
        run: npx astro build

      - name: Build search index
        run: npx pagefind --site dist

      - name: Upload pipeline report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-warnings
          path: src/data/generated/warnings.json

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
